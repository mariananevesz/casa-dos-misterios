<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozinha — Verdadeiro ou Falso</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <section class="tela tela--verde" id="tela-principal">

    <!-- HUD -->
    <section class="hud">
      <section class="hud__info">
        <img src="../img/icone-cozinha.png" alt="Cozinha" class="hud__icone-img">
        <section>
          <p class="hud__titulo hud__titulo--verde">Cozinha — Verdadeiro ou Falso</p> 
          <p class="hud__subtitulo hud__subtitulo--verde">Mini-jogo 3</p>
        </section>
      </section>
      <span class="badge badge--verde" id="badge-pts" aria-live="polite">0 pts</span>
    </section>

    <!-- Mascote Logi -->
    <section class="balao balao--verde" aria-label="Instruções do Logi">
      <img src="../img/logi.png" alt="Logi" class="logi-mascote"> 
      <p class="balao__texto balao__texto--verde" id="logi-texto">Carregando…</p>
    </section>

    <!-- Progresso -->
    <section class="progresso progresso--centro" id="progresso-dots" aria-label="Progresso das perguntas"></section>

    <!-- Caixa de pergunta -->
    <section class="pergunta-box" id="pergunta-box" aria-live="polite">
      <p class="pergunta-box__numero" id="pergunta-numero">Pergunta 1 de 5</p>
      <p class="pergunta-box__frase"  id="pergunta-frase"></p>
      <p class="pergunta-box__aviso">Leia com atenção antes de responder!</p>
    </section>

    <!-- Botões V/F -->
    <section class="vf-grid">
      <button class="btn-vf btn-vf--verde" id="btn-verdadeiro" aria-label="Verdadeiro">
        <img src="../img/verdadeiro.png" alt="" class="btn-vf__emoji-img">
        Verdadeiro
      </button>
      <button class="btn-vf btn-vf--vermelho" id="btn-falso" aria-label="Falso">
        <img src="../img/falso.png" alt="" class="btn-vf__emoji-img">
        Falso
      </button>
    </section>

    <!-- Feedback imediato -->
    <section id="feedback-area" aria-live="assertive" style="display:none;">
      <section class="dica" id="feedback-dica">
        <img src="../img/dica.png" alt="" class="dica-img">
        <p class="dica__texto" id="feedback-texto"></p>
      </section>
    </section>

    <!-- Dica do jogo -->
    <section class="dica dica--verde">
      <img src="../img/dica.png" alt="" class="dica-img">
      <p class="dica__texto dica__texto--verde" id="dica-texto"></p>
    </section>

  </section>

  <!-- Modal de conclusão -->
  <div class="modal-overlay" id="modal-conclusao" role="dialog" aria-modal="true" aria-labelledby="modal-titulo" style="display:none;">
    <section class="modal">
      <img src="../img/trofeu.png" alt="Troféu" class="modal-trofeu">
      <h2 class="modal-titulo" id="modal-titulo">Cozinha concluída!</h2>
      <p class="modal-sub" id="modal-sub"></p>
      <section class="modal-estrelas" id="modal-estrelas" aria-label="Estrelas conquistadas"></section>
      <p class="modal-pts" id="modal-pts"></p>
      <section class="btn-grupo" style="margin-top:1rem;">
        <button class="btn btn--verde" onclick="window.location.href='MapaCasa.html'">Voltar ao mapa</button>
      </section>
    </section>
  </div>

  <script src="../js/plataforma.js"></script>
  <script src="../js/gameState.js"></script>
  <script src="../js/audio.js"></script>
  <script>
  /* ===== COZINHA — lógica do jogo ===== */

  /* Dados embutidos — fallback quando fetch não está disponível (file://) */
  // SUBSTITUA a linha inteira do COZINHA_INLINE por:
const COZINHA_INLINE = {"miniJogo":"Cozinha — Verdadeiro ou Falso","habilidadeBNCC":"EF03CO01","instrucaoInstrutor":"Olá, chefinho! Vou te contar uma coisa sobre os alimentos. Você decide: é Verdadeiro ou Falso? Preste atenção nas palavras!","dica":"Dica: fique de olho nas palavras não, nunca, sempre e jamais!","blocos":[{"bloco":1,"perguntas":[{"id":1,"frase":"A banana é uma fruta.","resposta":true,"explicacao":"Sim! A banana é uma fruta muito comum no Brasil."},{"id":2,"frase":"O leite nunca vem da vaca.","resposta":false,"explicacao":"Errado! O leite vem sim da vaca. 'Nunca' tornou a frase falsa."},{"id":3,"frase":"O pão não precisa de farinha para ser feito.","resposta":false,"explicacao":"Errado! O pão precisa de farinha. 'Não' inverteu o sentido."},{"id":4,"frase":"O açúcar deixa os alimentos mais doces.","resposta":true,"explicacao":"Verdade! O açúcar adoça bolos, sucos e sobremesas."},{"id":5,"frase":"A cenoura sempre é um doce.","resposta":false,"explicacao":"Errado! A cenoura é um legume. 'Sempre' não muda isso."}]},{"bloco":2,"perguntas":[{"id":6,"frase":"O sorvete derrete quando fica no calor.","resposta":true,"explicacao":"Verdade! O sorvete é gelado e derrete quando esquenta."},{"id":7,"frase":"O ovo jamais pode ser frito.","resposta":false,"explicacao":"Errado! O ovo pode sim ser frito. 'Jamais' tornou a frase falsa."},{"id":8,"frase":"A maçã pode ser vermelha ou verde.","resposta":true,"explicacao":"Verdade! Existem maçãs de cores diferentes."},{"id":9,"frase":"O sal não é usado para temperar os alimentos.","resposta":false,"explicacao":"Errado! O sal é sim um tempero muito usado na cozinha."},{"id":10,"frase":"O tomate pode ser usado em molhos.","resposta":true,"explicacao":"Verdade! O tomate é muito usado em molhos e saladas."}]},{"bloco":3,"perguntas":[{"id":11,"frase":"O mel é doce.","resposta":true,"explicacao":"Verdade! O mel é um dos alimentos mais doces que existem."},{"id":12,"frase":"O limão nunca é azedo.","resposta":false,"explicacao":"Errado! O limão é azedo sim. 'Nunca' tornou a frase falsa."},{"id":13,"frase":"A laranja não tem suco.","resposta":false,"explicacao":"Errado! A laranja tem muito suco. 'Não' inverteu o sentido."},{"id":14,"frase":"O arroz é cozido na água.","resposta":true,"explicacao":"Verdade! O arroz é cozido na água para ficar macio."},{"id":15,"frase":"O peixe sempre vive na terra.","resposta":false,"explicacao":"Errado! O peixe vive na água, não na terra."}]},{"bloco":4,"perguntas":[{"id":16,"frase":"O feijão é um alimento.","resposta":true,"explicacao":"Verdade! O feijão é um alimento muito nutritivo."},{"id":17,"frase":"O leite jamais pode ser aquecido.","resposta":false,"explicacao":"Errado! O leite pode sim ser aquecido. 'Jamais' tornou a frase falsa."},{"id":18,"frase":"O morango não é uma fruta.","resposta":false,"explicacao":"Errado! O morango é uma fruta deliciosa e vermelha."},{"id":19,"frase":"O milho pode ser cozido ou assado.","resposta":true,"explicacao":"Verdade! O milho fica gostoso das duas formas."},{"id":20,"frase":"A batata sempre cresce nas árvores.","resposta":false,"explicacao":"Errado! A batata cresce embaixo da terra, não nas árvores."}]},{"bloco":5,"perguntas":[{"id":21,"frase":"O abacaxi é uma fruta.","resposta":true,"explicacao":"Verdade! O abacaxi é uma fruta tropical bem saborosa."},{"id":22,"frase":"O chocolate nunca é feito de cacau.","resposta":false,"explicacao":"Errado! O chocolate é feito de cacau sim. 'Nunca' tornou a frase falsa."},{"id":23,"frase":"A alface não é uma verdura.","resposta":false,"explicacao":"Errado! A alface é uma verdura usada em saladas."},{"id":24,"frase":"O queijo é feito a partir do leite.","resposta":true,"explicacao":"Verdade! O leite é o ingrediente principal do queijo."},{"id":25,"frase":"O feijão sempre é uma fruta doce.","resposta":false,"explicacao":"Errado! O feijão é um grão, não uma fruta."}]}]};
  let gameData    = null;
  let perguntaIdx = 0;
  let acertos     = 0;
  let respondendo = false;


  async function init() {
    try {
      gameData = await loadGameData('../data/cozinha.json');
    } catch(e) {
      gameData = COZINHA_INLINE; // fallback file://
    }
    const blocoIdx        = gameState.getCozinhaBloco();          // lê e avança o contador
    gameData.perguntas    = gameData.blocos[blocoIdx].perguntas;  // seleciona o bloco certo
    document.getElementById('logi-texto').textContent = gameData.instrucaoInstrutor; 
    document.getElementById('dica-texto').textContent = gameData.dica;
    renderPergunta();
    atualizarBadge();
  }

  /* ---- Renderiza pergunta atual ---- */
  function renderPergunta() {
    const total = gameData.perguntas.length;
    const p     = gameData.perguntas[perguntaIdx];
    document.getElementById('pergunta-numero').textContent = `Pergunta ${perguntaIdx + 1} de ${total}`;
    document.getElementById('pergunta-frase').innerHTML = destacarPalavrasChaves(destacarNegacoes(p.frase));
    document.getElementById('feedback-area').style.display = 'none';
    renderProgresso();
    habilitarBotoes(true);
  }

  function destacarNegacoes(frase) {
    return frase.replace(/\b(não|nunca|sempre|jamais)\b/gi,
      '<u style="font-weight:700;">$1</u>');
  }
  function destacarPalavrasChaves(frase)
  {
    return frase.replace(/\b(fruta|vermelha|verde|doces|calor)\b/gi,
      '<u style="font-weight:700;">$1</u>');
  }

  /* ---- Bolinhas de progresso ---- */
  function renderProgresso() {
    const cont  = document.getElementById('progresso-dots');
    const total = gameData.perguntas.length;
    cont.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const span = document.createElement('span');
      span.className = 'progresso__bolinha ' + (
        i < perguntaIdx ? 'progresso__bolinha--ok' :
        i === perguntaIdx ? 'progresso__bolinha--meio' :
        'progresso__bolinha--vazio'
      );
      span.setAttribute('aria-label', `Pergunta ${i+1}: ${
        i < perguntaIdx ? 'respondida' : i === perguntaIdx ? 'atual' : 'pendente'}`);
      cont.appendChild(span);
    }
  }

  /* ---- Resposta ---- */
  function responder(escolha) {
    if (respondendo) return;
    respondendo = true;
    habilitarBotoes(false);

    const p  = gameData.perguntas[perguntaIdx];
    const ok = escolha === p.resposta;

    if (ok) {
      acertos++;
      audio.acerto();
      const msg = p.explicacao || 'Correto! Muito bem!';
      mostrarFeedback(msg, 'verde');
    } else {
      audio.erro();
      const msg = p.explicacao
        ? `Ops! ${p.explicacao}`
        : `Ops! A resposta correta é ${p.resposta ? 'Verdadeiro' : 'Falso'}.`;
      mostrarFeedback(msg, 'erro');
    }

    atualizarBadge();

    setTimeout(() => {
      perguntaIdx++;
      respondendo = false;
      if (perguntaIdx >= gameData.perguntas.length) {
        conclusao();
      } else {
        renderPergunta();
      }
    }, 1200);
  }

  function mostrarFeedback(msg, tipo) {
    const dica = document.getElementById('feedback-dica');
    const txt  = document.getElementById('feedback-texto');
    dica.className = `dica dica--${tipo === 'verde' ? 'verde' : 'erro'}`;
    txt.className  = `dica__texto dica__texto--${tipo === 'verde' ? 'verde' : 'erro'}`;
    txt.textContent = msg;
    document.getElementById('feedback-area').style.display = 'block';
  }

  function habilitarBotoes(on) {
    document.getElementById('btn-verdadeiro').disabled = !on;
    document.getElementById('btn-falso').disabled      = !on;
  }

  /* ---- Conclusão ---- */
  function conclusao() {
    const erros = gameData.perguntas.length - acertos;
    const score = gameState.calcularScore(erros);
    gameState.setRoomScore('cozinha', score);
    atualizarBadge(score);

    const estrelas = gameState.getStars(score);
    const elEst = document.getElementById('modal-estrelas');
    elEst.innerHTML = '';
    for (let i = 0; i < 3; i++) {
      const img = document.createElement('img');
      img.src = i < estrelas ? '../img/estrela.png' : '../img/estrela-vazia.png';
      img.alt = i < estrelas ? 'Estrela' : '';
      img.className = 'modal-estrela-img';
      elEst.appendChild(img);
    }

    document.getElementById('modal-sub').textContent =
      `Você acertou ${acertos} de ${gameData.perguntas.length} perguntas!`;
    document.getElementById('modal-pts').textContent = `Pontuação: ${score} / 25 pts`;
    document.getElementById('modal-conclusao').style.display = 'flex';

    if (score === 25) audio.conclusao();
    window.removeEventListener('beforeunload', beforeUnloadHandler);
  }

  function atualizarBadge(score) {
    const pts = score !== undefined
      ? score
      : Math.round((acertos / (gameData?.perguntas.length || 5)) * 25);
    document.getElementById('badge-pts').textContent = pts + ' pts';
  }

  function beforeUnloadHandler() {
    sendFinalScore({ score: gameState.getTotalScore(), difficulty: getPlatformDifficulty() });
  }
  window.addEventListener('beforeunload', beforeUnloadHandler);

  document.getElementById('btn-verdadeiro').addEventListener('click', () => { if (gameData) responder(true);  });
  document.getElementById('btn-falso').addEventListener('click',      () => { if (gameData) responder(false); });

  document.addEventListener('keydown', e => {
    if (!gameData) return;
    if (e.key.toLowerCase() === 'v') responder(true);
    if (e.key.toLowerCase() === 'f') responder(false);
  });

  init();
  </script>

</body>
</html>
