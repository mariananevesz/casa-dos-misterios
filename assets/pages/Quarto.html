<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quarto — Depuração</title>
  <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>

  <section class="tela tela--roxa" id="tela-principal">

    <!-- HUD -->
    <section class="hud">
      <section class="hud__info">
        <img src="../img/icone-quarto.png" alt="Quarto" class="hud__icone-img">
        <section>
          <p class="hud__titulo hud__titulo--roxo">Quarto — Depuração</p>
          <p class="hud__subtitulo hud__subtitulo--roxo">Mini-jogo 2</p>
        </section>
      </section>
      <span class="badge badge--roxo" id="badge-pts" aria-live="polite">0 pts</span>
    </section>

    <!-- Mascote Logi -->
    <section class="balao balao--roxo" aria-label="Instruções do Logi">
      <img src="../img/logi.png" alt="Logi" class="logi-mascote">
      <p class="balao__texto balao__texto--roxo" id="logi-texto">Carregando…</p>
    </section>

    <!-- Blocos com erro (fonte) -->
    <section class="painel painel--roxo">
      <p class="painel__label">Clique ou arraste os blocos corretos para baixo</p>
      <section class="blocos" id="blocos-fonte" role="listbox" aria-label="Blocos disponíveis (alguns com erro)"></section>
      <section class="dica dica--erro" id="dica-erros" style="margin-top:8px;margin-bottom:0;">
        <img src="../img/dica.png" alt="" class="dica-img">
        <p class="dica__texto dica__texto--erro" id="dica-texto"></p>
      </section>
    </section>

    <!-- Sequência corrigida (destino) -->
    <section class="painel painel--roxo painel--tracejado"
             id="painel-destino"
             aria-dropeffect="move">
      <p class="painel__label">Sequência Corrigida — monte a ordem certa aqui</p>
      <section class="blocos" id="sequencia-corrigida" role="listbox" aria-label="Sequência corrigida" aria-live="polite"></section>
    </section>

    <!-- Feedback de verificação -->
    <section id="feedback-area" style="display:none;" aria-live="polite">
      <section class="blocos" id="feedback-blocos" style="margin-bottom:0.5rem;flex-wrap:wrap;gap:6px;"></section>
    </section>

    <!-- Botões -->
    <section class="btn-grupo">
      <button class="btn btn--roxo" id="btn-verificar" aria-label="Verificar sequência">Verificar sequência</button>
      <button class="btn btn--outline-roxo" id="btn-limpar" aria-label="Limpar sequência corrigida">Limpar</button>
    </section>

  </section>

  <!-- Modal de conclusão -->
  <div class="modal-overlay" id="modal-conclusao" role="dialog" aria-modal="true" aria-labelledby="modal-titulo" style="display:none;">
    <section class="modal">
      <img src="../img/trofeu.png" alt="Troféu" class="modal-trofeu">
      <h2 class="modal-titulo" id="modal-titulo">Depuração completa!</h2>
      <p class="modal-sub" id="modal-sub"></p>
      <section class="modal-estrelas" id="modal-estrelas" aria-label="Estrelas conquistadas"></section>
      <p class="modal-pts" id="modal-pts"></p>
      <section class="btn-grupo" style="margin-top:1rem;">
        <button class="btn btn--roxo" onclick="window.location.href='MapaCasa.html'">Voltar ao mapa</button>
      </section>
    </section>
  </div>

  <script src="../js/plataforma.js"></script>
  <script src="../js/gameState.js"></script>
  <script src="../js/audio.js"></script>
  <script>
  /* ===== QUARTO — lógica do jogo ===== */

  /* Dados embutidos — fallback quando fetch não está disponível (file://) */
    const QUARTO_INLINE = {
  "miniJogo": "Quarto — Depuração",
  "habilidadeBNCC": "EF02CO02",
  "instrucaoInstrutor": "Oi! Minha rotina está com alguns erros! Encontre o problema, monte a sequência correta e ajude a organizar o quarto.",
  "fases": [
    {
      "id": 1,
      "titulo": "Fase 1 — Um passo fora do lugar",
      "dificuldade": "Fácil",
      "dica": "Dica: há 1 bloco fora de ordem.",
      "sequenciaComErros": [
        { "id": "dentes", "rotulo": "🦷 Escovar os dentes", "erro": false },
        { "id": "tenis", "rotulo": "👟 Calçar o tênis", "erro": true },
        { "id": "roupa", "rotulo": "👕 Vestir a roupa", "erro": true },
        { "id": "cafe", "rotulo": "🍳 Tomar café", "erro": false }
      ],
      "sequenciaCorreta": ["dentes", "roupa", "tenis", "cafe"]
    },
    {
      "id": 2,
      "titulo": "Fase 2 — Tem coisa repetida",
      "dificuldade": "Médio",
      "dica": "Dica: há 1 bloco repetido. Use cada ação apenas quando fizer sentido.",
      "sequenciaComErros": [
        { "id": "dentes", "rotulo": "🦷 Escovar os dentes", "erro": false },
        { "id": "roupa", "rotulo": "👕 Vestir a roupa", "erro": false },
        { "id": "tenis", "rotulo": "👟 Calçar o tênis", "erro": false },
        { "id": "tenis", "rotulo": "👟 Calçar o tênis", "erro": true },
        { "id": "cafe", "rotulo": "🍳 Tomar café", "erro": false }
      ],
      "sequenciaCorreta": ["dentes", "roupa", "tenis", "cafe"]
    },
    {
      "id": 3,
      "titulo": "Fase 3 — Depuração completa",
      "dificuldade": "Difícil",
      "dica": "Dica: há bloco repetido, bloco desnecessário e ações fora de ordem.",
      "sequenciaComErros": [
        { "id": "cafe", "rotulo": "🍳 Tomar café", "erro": true },
        { "id": "dentes", "rotulo": "🦷 Escovar os dentes", "erro": false },
        { "id": "brincar", "rotulo": "🧸 Brincar", "erro": true },
        { "id": "mochila", "rotulo": "🎒 Arrumar a mochila", "erro": false },
        { "id": "roupa", "rotulo": "👕 Vestir a roupa", "erro": false },
        { "id": "tenis", "rotulo": "👟 Calçar o tênis", "erro": false },
        { "id": "tenis", "rotulo": "👟 Calçar o tênis", "erro": true }
      ],
      "sequenciaCorreta": ["dentes", "roupa", "tenis", "cafe", "mochila"]
    }
  ]
};

  let gameData   = null;
  let faseAtual = 0;
  let corrigida  = [];
  let verificado = false;
  let erros      = 0;
  let touchBloco = null;
  let touchGhost = null;
  const FASE_KEY = 'quarto_fase';

  async function init() {
    try {
      gameData = await loadGameData('../data/quarto.json');
    } catch(e) {
      gameData = QUARTO_INLINE; // fallback file://
    }
    faseAtual = Math.min(
    parseInt(localStorage.getItem(FASE_KEY) || '0'),
    gameData.fases.length - 1
);
    renderFase();
  }

  function renderFase() {
  const fase = gameData.fases[faseAtual];

  document.getElementById('logi-texto').textContent = gameData.instrucaoInstrutor;
  document.querySelector('.hud__subtitulo--roxo').textContent =
    `Fase ${fase.id} de ${gameData.fases.length}`;

  document.getElementById('dica-texto').textContent = fase.dica;

  corrigida = [];
  verificado = false;
  erros = 0;

  buildFonte();
  renderCorrigida();

  document.getElementById('feedback-area').style.display = 'none';
  document.getElementById('btn-verificar').disabled = false;

  atualizarBadge();
}

  /* ---- Blocos fonte (com erros marcados) ---- */
  function buildFonte() {
    const fase = gameData.fases[faseAtual];
    const cont = document.getElementById('blocos-fonte');
    cont.innerHTML = '';

    // IDs únicos disponíveis para montar a sequência corrigida
    fase.sequenciaComErros.forEach((bloco, index) => {
  const id = bloco.id;
  const temErro = bloco.erro;

      const el = document.createElement('span');
      el.className = `bloco ${temErro ? 'bloco--erro' : 'bloco--roxo'}`;
      el.draggable = true;
      el.dataset.index = index;
      el.setAttribute('role', 'option');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-label', `${bloco.rotulo}${temErro ? ' — suspeito' : ''}`);

      const img = imgTag(id);
      
      el.innerHTML = `${img} ${bloco.rotulo}${temErro ? ' <span class="bloco__tag-erro">!</span>' : ''}`;

      el.addEventListener('dragstart', e => {
        e.dataTransfer.setData('blocoId', id);
      });
      el.addEventListener('touchstart', touchStart, { passive: true });
      el.addEventListener('touchmove',  touchMove,  { passive: false });
      el.addEventListener('touchend',   touchEnd,   { passive: true });
      el.addEventListener('click', () => { adicionarBloco(id);});
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); adicionarBloco(id); }
      });

      cont.appendChild(el);
    });
  }

  function imgTag(id) {
    const fase = gameData.fases[faseAtual];
    const mapa = {
      tenis:  '../img/item-tenis.png',
      dentes: '../img/item-dentes.png',
      roupa:  '../img/item-roupa.png',
      cafe:   '../img/item-cafe.png',
      mochila: '../img/item-mochila.png',
      brincar: '../img/item-brinquedo.png'
    };
    const src = mapa[id] || '../img/logi.png';
    const bloco = fase.sequenciaComErros.find(b => b.id === id);
    return `<img src="${src}" alt="" class="bloco-img">`;
  }

  /* ---- Sequência corrigida (destino) ---- */
  function renderCorrigida() {
    const cont = document.getElementById('sequencia-corrigida');
    cont.innerHTML = '';
    const fase = gameData.fases[faseAtual];
    const total = fase.sequenciaCorreta.length;

    corrigida.forEach((bid, idx) => {
      const bloco = fase.sequenciaComErros.find(b => b.id === bid && !b.erro)
                 || { id: bid, rotulo: bid, erro: false };
      const el = document.createElement('span');
      el.className = 'bloco bloco--roxo';
      el.dataset.idx = idx;
      el.setAttribute('aria-label', `${bloco.rotulo}, posição ${idx+1}. Clique para remover.`);
      el.setAttribute('tabindex', '0');
      el.innerHTML = `${imgTag(bid)} ${bloco.rotulo}`;
      el.addEventListener('click', () => removerBloco(idx));
      el.addEventListener('keydown', e => {
        if (e.key === 'Delete' || e.key === 'Backspace') removerBloco(idx);
      });
      cont.appendChild(el);
    });

    for (let i = corrigida.length; i < total; i++) {
      const empty = document.createElement('span');
      empty.className = 'bloco bloco--vazio';
      empty.textContent = '+ bloco';
      empty.setAttribute('aria-label', 'Slot vazio');
      cont.appendChild(empty);
    }

    // drop na área
    cont.ondragover = e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; };
    cont.ondrop = e => {
      e.preventDefault();
      const bid = e.dataTransfer.getData('blocoId');
      if (bid) adicionarBloco(bid);
    };
  }

  function adicionarBloco(bid) {
    if (verificado) return;
    const fase = gameData.fases[faseAtual];
    if (corrigida.length >= fase.sequenciaCorreta.length) return;
    corrigida.push(bid);
    audio.clique();
    renderCorrigida();
    document.getElementById('feedback-area').style.display = 'none';
  }

  function removerBloco(idx) {
    if (verificado) return;
    corrigida.splice(idx, 1);
    renderCorrigida();
    document.getElementById('feedback-area').style.display = 'none';
  }

  /* ---- Touch drag ---- */
  function touchStart(e) {
    touchBloco = e.currentTarget.dataset.blocoId;
    const touch = e.touches[0];
    touchGhost = e.currentTarget.cloneNode(true);
    touchGhost.style.cssText = `position:fixed;opacity:0.75;pointer-events:none;z-index:9999;left:${touch.clientX-30}px;top:${touch.clientY-20}px;`;
    document.body.appendChild(touchGhost);
  }
  function touchMove(e) {
    e.preventDefault();
    if (!touchGhost) return;
    const touch = e.touches[0];
    touchGhost.style.left = (touch.clientX - 30) + 'px';
    touchGhost.style.top  = (touch.clientY - 20) + 'px';
  }
  function touchEnd(e) {
    if (touchGhost) { touchGhost.remove(); touchGhost = null; }
    if (!touchBloco) return;
    const touch = e.changedTouches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const dest = document.getElementById('sequencia-corrigida');
    if (dest && (dest === el || dest.contains(el))) adicionarBloco(touchBloco);
    touchBloco = null;
  }

  /* ---- Verificação ---- */
  function verificar() {
    const fase = gameData.fases[faseAtual];
    if (corrigida.length < fase.sequenciaCorreta.length) {
      mostrarFeedbackTexto('Complete todos os slots antes de verificar!');
      return;
    }
    verificado = true;

    const correta = fase.sequenciaCorreta;
    let acertos = 0;
    const area = document.getElementById('feedback-area');
    const cont = document.getElementById('feedback-blocos');
    cont.innerHTML = '';
    area.style.display = 'block';

    corrigida.forEach((bid, i) => {
      const ok = bid === correta[i];
      if (ok) acertos++;
      const bloco = fase.sequenciaComErros.find(b => b.id === bid) || { rotulo: bid };
      const el = document.createElement('span');
      el.className = `bloco ${ok ? 'bloco--verde' : 'bloco--erro'}`;
      el.setAttribute('aria-label', `${bloco.rotulo} — ${ok ? 'correto' : 'incorreto'}`);
      el.innerHTML = `${imgTag(bid)} ${bloco.rotulo}`;
      cont.appendChild(el);
    });

    if (acertos === correta.length) {
      audio.acerto();
      setTimeout(() => conclusao(), 600);
    } else {
      erros++;
      audio.erro();
      verificado = false;
      // Permite tentar novamente
      setTimeout(() => {
        mostrarFeedbackTexto(`${acertos} de ${correta.length} corretos. Ajuste sua sequência e tente novamente!`);
      }, 1200);
    }
  }

  function mostrarFeedbackTexto(msg) {
    const cont = document.getElementById('feedback-blocos');
    cont.innerHTML = `<span style="font-size:12px;color:var(--vermelho);">${msg}</span>`;
    document.getElementById('feedback-area').style.display = 'block';
  }

 function conclusao() {
  const fase = gameData.fases[faseAtual];

  const scoreFase = gameState.calcularScore(erros);

  let scoresQuarto = JSON.parse(localStorage.getItem('quarto_scores_fases') || '{}');
  scoresQuarto[fase.id] = scoreFase;
  localStorage.setItem('quarto_scores_fases', JSON.stringify(scoresQuarto));

  const somaFases = Object.values(scoresQuarto).reduce((soma, valor) => soma + valor, 0);
  const totalQuarto = Math.round(somaFases / gameData.fases.length);

  gameState.setRoomScore('quarto', totalQuarto);
  atualizarBadge(totalQuarto);

  const proxFase = faseAtual + 1;

  if (proxFase < gameData.fases.length) {
    localStorage.setItem(FASE_KEY, proxFase);
  } else {
    localStorage.removeItem(FASE_KEY);
  }

  document.getElementById('modal-sub').textContent =
    `Você corrigiu a sequência da ${fase.titulo}!`;

  document.getElementById('modal-pts').textContent =
    `Pontuação da fase: ${scoreFase} / 25 pts`;

  const elEst = document.getElementById('modal-estrelas');
  elEst.innerHTML = '';

  const estrelas = gameState.getStars(scoreFase);

  for (let i = 0; i < 3; i++) {
    const img = document.createElement('img');
    img.src = i < estrelas ? '../img/estrela.png' : '../img/estrela-vazia.png';
    img.alt = i < estrelas ? 'Estrela' : 'Estrela vazia';
    img.className = 'modal-estrela-img';
    elEst.appendChild(img);
  }

  const btnGrupo = document.querySelector('#modal-conclusao .btn-grupo');

  btnGrupo.innerHTML = '';

  if (proxFase < gameData.fases.length) {
    const btnProx = document.createElement('button');
    btnProx.className = 'btn btn--roxo';
    btnProx.textContent = 'Próxima fase';
    btnProx.onclick = () => {
      faseAtual = proxFase;
      document.getElementById('modal-conclusao').style.display = 'none';
      renderFase();
    };
    btnGrupo.appendChild(btnProx);
  }

  const btnMapa = document.createElement('button');
  btnMapa.className = 'btn btn--outline-roxo';
  btnMapa.textContent = 'Voltar ao mapa';
  btnMapa.onclick = () => {
    window.location.href = 'MapaCasa.html';
  };
  btnGrupo.appendChild(btnMapa);

  document.getElementById('modal-conclusao').style.display = 'flex';
  window.removeEventListener('beforeunload', beforeUnloadHandler);
}

  function atualizarBadge(score) {
    const s = score !== undefined ? score : (gameState.get().scores.quarto || 0);
    document.getElementById('badge-pts').textContent = s + ' pts';
  }

  function beforeUnloadHandler() {
    const s = gameState.get().scores.quarto;
    if (s !== null) sendFinalScore({ score: gameState.getTotalScore(), difficulty: getPlatformDifficulty() });
  }
  window.addEventListener('beforeunload', beforeUnloadHandler);

  document.getElementById('btn-verificar').addEventListener('click', () => { if (gameData) verificar(); });
  document.getElementById('btn-limpar').addEventListener('click', () => {
    if (!gameData) return;
    corrigida = [];
    verificado = false;
    renderCorrigida();
    document.getElementById('feedback-area').style.display = 'none';
  });

  init();
  </script>

</body>
</html>
